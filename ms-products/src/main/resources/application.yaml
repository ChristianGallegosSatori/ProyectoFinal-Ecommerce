server:
  port: 8081

spring:
  application:
    name: ms-products

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_products}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          # Se valida la firma contra las claves publicas de Keycloak (JWKS).
          # No se usa issuer-uri porque el "iss" del token cambia segun por donde
          # se pida (localhost vs nombre del contenedor "keycloak" dentro de Docker).
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/ecommerce/protocol/openid-connect/certs}

# Configuración personalizada para la API de Gemini
gemini:
  api:
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}
    key: ${GEMINI_API_KEY}