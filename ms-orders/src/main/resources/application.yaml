server:
  port: 8082

spring:
  application:
    name: ms-orders

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_orders}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/ecommerce/protocol/openid-connect/certs}

  # Habilitar soporte de Feign para usar Circuit Breaker
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

# URL del microservicio ms-products consumido vía Feign
clients:
  products:
    url: ${PRODUCTS_SERVICE_URL:http://localhost:8081}

# Configuración de Patrones de Resiliencia (Circuit Breaker + Retry)
resilience4j:
  circuitbreaker:
    instances:
      productsCB:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 2
  retry:
    instances:
      productsRetry:
        maxAttempts: 3
        waitDuration: 1000