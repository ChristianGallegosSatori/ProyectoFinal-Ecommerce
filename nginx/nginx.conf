events {}

http {
    upstream ms-products {
        server ms-products:8081;
    }

    upstream ms-orders {
        server ms-orders:8082;
    }

    upstream ms-customers {
        server ms-customers:8083;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    server {
        listen 80;

        # Punto de entrada único del sistema.
        # TODO: cuando exista el frontend, servirlo aquí en "/" (root o proxy_pass al contenedor del cliente web).

        # Sin rewrite: el path público coincide 1:1 con el @RequestMapping de cada
        # microservicio (fuente de verdad única, evita desfaces entre gateway y código).
        location /api/v1/products {
            proxy_pass http://ms-products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/orders {
            proxy_pass http://ms-orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/customers {
            proxy_pass http://ms-customers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        location /auth/ {
            proxy_pass http://keycloak/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
